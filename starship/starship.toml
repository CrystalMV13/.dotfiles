palette = "default"
format = """\
$cmd_duration$all$sudo$character
"""
right_format = "$time"


[character]
success_symbol = '[⟣](teal)'
error_symbol = '[⟣](red)'

[cmd_duration]
disabled = false
style = "teal"
show_notifications = true
min_time_to_notify = 120_000
format = "took [$duration]($style)\n\n"

[directory]
style = "bold teal"
truncation_symbol = ".../"
read_only = " 󰌾"

[sudo]
disabled = false
style = "teal"
symbol = "󱇐"
format = "[$symbol]($style) "

[time]
disabled = false


[palettes.default]
cyan = "#7ddddd"
teal = "#B8E6FB"
red = "#f38ba8"


